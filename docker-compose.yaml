services:
  casper-era-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casper-era-tracker
    ports:
      - "5000:5000"
    environment:
      - CSPR_CLOUD_API_KEY=${CSPR_CLOUD_API_KEY}
      - CACHE_DURATION=${CACHE_DURATION:-60}
      - FLASK_ENV=production
      - FLASK_DEBUG=false
    env_file:
      - backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
